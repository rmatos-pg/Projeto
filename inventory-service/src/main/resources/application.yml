spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:h2:mem:inventory;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

server:
  port: 8082

app:
  operation-timeout-ms: 10000
  idempotency-ttl-hours: 24
