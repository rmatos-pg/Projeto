spring:
  application:
    name: payment-api
  datasource:
    url: jdbc:h2:mem:payments;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

server:
  port: 8081

app:
  operation-timeout-seconds: 15
  idempotency-ttl-hours: 24
